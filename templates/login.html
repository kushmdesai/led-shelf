<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shelf - Login</title>
<style>
  :root {
    --bg: #0e0e10;
    --surface: #1a1a1f;
    --border: #2e2e35;
    --text: #f0f0f2;
    --muted: #7a7a85;
    --danger: #f87171;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  main {
    width: min(100%, 360px);
  }

  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  p {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }

  form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  label {
    display: block;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  input {
    width: 100%;
    height: 48px;
    background: #242429;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 16px;
    padding: 0 14px;
    outline: none;
  }

  input:focus { border-color: var(--muted); }

  button {
    width: 100%;
    height: 48px;
    margin-top: 16px;
    border: none;
    border-radius: 12px;
    background: var(--text);
    color: var(--bg);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  .error {
    color: var(--danger);
    margin: 0 0 14px;
  }
</style>
</head>
<body>
<main>
  <h1>Shelf</h1>
  <p>Sign in to control the lights.</p>

  <form method="post" action="/login">
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>
    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
    <button type="submit">Log in</button>
  </form>
</main>
</body>
</html>
